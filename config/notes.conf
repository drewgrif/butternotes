# Notes System Configuration

# Default notes directory
NOTES_DIR="$HOME/notes"

# Default editor (uses nvim with your markdown setup)
NOTES_EDITOR="nvim"

# Default note extension
NOTES_EXT="md"

# Date format for daily notes
DATE_FORMAT="%Y-%m-%d"

# Templates directory
TEMPLATES_DIR="$HOME/ButterNotes/templates"

# Enable preview in fzf (requires bat)
ENABLE_PREVIEW=true

# Preview window size
PREVIEW_SIZE="50%"